name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APKs
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs for release
        run: |
          mkdir release-apks
          VERSION=${{ steps.version.outputs.version }}
          # Universal
          cp build/app/outputs/flutter-apk/app-release.apk \
             release-apks/Readora-v$VERSION-universal.apk
          # Split
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-apks/Readora-v$VERSION-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-apks/Readora-v$VERSION-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-apks/Readora-v$VERSION-x86_64.apk

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: release-apks/*.apk

  build-ios:
    name: Build iOS Unsigned IPA
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build iOS Application (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Readora-v${{ steps.version.outputs.version }}-unsigned.ipa Payload
          mkdir release-ipas
          mv Readora-v${{ steps.version.outputs.version }}-unsigned.ipa release-ipas/

      - name: Upload IPA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipas
          path: release-ipas/*.ipa

  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks
          path: release-assets

      - name: Download IPAs
        uses: actions/download-artifact@v4
        with:
          name: ipas
          path: release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
